name: Build GameVanila APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential git ccache libffi-dev libssl-dev python3-dev openjdk-17-jdk zip unzip zlib1g-dev autoconf libtool pkg-config
        pip install --upgrade pip setuptools
        pip install "cython<3.0.0" buildozer

    - name: Build APK with Buildozer
      run: |
        yes | buildozer android debug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: GameVanila-APK
        path: bin/*.apk
