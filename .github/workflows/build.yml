name: Build GameVanila APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ccache git libffi-dev libssl-dev python3-dev build-essential libsqlite3-dev zlib1g-dev openjdk-17-jdk zip unzip
        pip install --upgrade pip
        pip install buildozer cython==0.29.33

    - name: Build APK with Buildozer
      run: |
        buildozer android debug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: GameVanila-APK
        path: bin/*.apk
